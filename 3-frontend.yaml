apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cnpj-ui
  template:
    metadata:
      labels:
        app: cnpj-ui
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cnpj-manager-ui
          image: gelleres/cnpj-manager-front:157bcae7a99c356d0e7faf812c2ff448b84af6ac
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
              ephemeral-storage: "128Mi"
            limits:
              memory: "128Mi"
              cpu: "200m"
              ephemeral-storage: "256Mi" 
          env:
            - name: API_URL
              value: "http://api-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: cnpj-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080